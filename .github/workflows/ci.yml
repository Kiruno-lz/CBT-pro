name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust-ci:
    name: Rust Workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust_core
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cbtpro
          POSTGRES_PASSWORD: cbtpro
          POSTGRES_DB: cbtpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-ci"
          workspaces: "rust_core"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        env:
          DATABASE_URL: postgres://cbtpro:cbtpro@localhost/cbtpro
        run: cargo test --workspace --verbose

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Generate coverage report
        env:
          DATABASE_URL: postgres://cbtpro:cbtpro@localhost/cbtpro
        run: cargo tarpaulin --workspace --out Xml --verbose

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./rust_core/cobertura.xml
          fail_ci_if_error: false
          verbose: true

  frontend-ci:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint -- --fix

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Run unit tests
        run: bun test

      - name: Build production bundle
        run: bun run build
