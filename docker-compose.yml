version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: cbt-pro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cbtpro
      POSTGRES_PASSWORD: cbtpro
      POSTGRES_DB: cbtpro
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbtpro -d cbtpro"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cbt-pro-network

  redis:
    image: redis:7-alpine
    container_name: cbt-pro-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cbt-pro-network

  rust_engine:
    build:
      context: ./rust_core
      dockerfile: Dockerfile
    container_name: cbt-pro-rust-engine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cbtpro:cbtpro@postgres/cbtpro
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      REST_PORT: 8080
      WS_PORT: 8081
    ports:
      - "8080:8080"
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cbt-pro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cbt-pro-frontend
    restart: unless-stopped
    depends_on:
      rust_engine:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - cbt-pro-network

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  cbt-pro-network:
    driver: bridge
    name: cbt-pro-network
